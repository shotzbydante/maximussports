  <rect x="220" y="34" width="56" height="18" rx="9" fill="#3C79B4" opacity=".25"/>
  <text x="230" y="47" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#7bb8e0">BUBBLE</text>
  <!-- Bubble Watch tiers -->
  <rect x="24" y="76" width="280" height="36" rx="6" fill="#1c3450" opacity=".55"/>
