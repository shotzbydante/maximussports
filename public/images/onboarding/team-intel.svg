  <text x="44" y="336" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#5c9fd4" letter-spacing=".08em">CHAMPIONSHIP ODDS</text>
  <text x="44" y="358" font-family="monospace" font-size="18" font-weight="700" fill="#2d8a6e">+650</text>
  <text x="96" y="358" font-family="system-ui,sans-serif" font-size="11" fill="#7bb8e0">to win national championship</text>
  <rect x="440" y="326" width="64" height="22" rx="4" fill="#3C79B4" opacity=".3"/>
  <text x="450" y="342" font-family="monospace" font-size="10" fill="#7bb8e0">˛ +50</text>
