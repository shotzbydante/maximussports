  <text x="340" y="124" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">18-9-1</text>
  <text x="418" y="124" font-family="system-ui,sans-serif" font-size="13" fill="#5c9fd4">vs spread</text>
